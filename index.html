<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- favicon -->
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <title>Weather App</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body
    class="bg-gradient-to-br from-[#0f172a] via-[#111827] to-[#020617] text-white min-h-screen flex items-center justify-center">

    <div class="w-full max-w-md mx-auto p-6">

        <!-- App Title -->
        <h1 class="text-4xl font-semibold text-center mb-8 tracking-tight">
            Weather<span class="text-blue-400">.</span>
        </h1>

        <!-- Search -->
        <div class="flex gap-2 mb-4">
            <input id="cityInput" type="text" placeholder="Search city..."
                class="w-full p-3 rounded-xl bg-white/10 backdrop-blur-md border border-white/10 focus:outline-none focus:ring-2 focus:ring-blue-500 placeholder-gray-400" />
            <button id="searchBtn" class="bg-blue-500 hover:bg-blue-600 px-5 rounded-xl transition">
                🔍
            </button>
        </div>

        <!-- Location Button -->
        <button id="locationBtn"
            class="w-full bg-white/10 backdrop-blur-md border border-white/10 py-2 rounded-xl mb-6 hover:bg-white/20 transition">
            Use My Location 📍
        </button>

        <!-- Weather Card -->
        <div class="relative bg-white/10 backdrop-blur-xl border border-white/10 p-6 rounded-3xl shadow-2xl">

            <!-- Glow Effect -->
            <div
                class="absolute inset-0 rounded-3xl bg-gradient-to-br from-blue-500/10 to-transparent pointer-events-none">
            </div>

            <!-- Loader -->
            <p id="loader" class="text-center mb-4 hidden text-blue-300">
                Loading...
            </p>

            <!-- Top Section -->
            <div class="flex items-center justify-between">

                <!-- City -->
                <div>
                    <h2 id="cityName" class="text-2xl font-semibold">City Name</h2>
                    <p id="description" class="text-gray-400 text-sm mt-1">Clear Sky</p>
                </div>

                <!-- Icon -->
                <img id="weatherIcon" src="" alt="weather icon" class="w-16 h-16" />
            </div>

            <!-- Temperature -->
            <div class="mt-6 text-center">
                <p id="temperature" class="text-7xl font-bold tracking-tight">
                    25°
                </p>
            </div>

        </div>

    </div>

    <script src="app.js"></script>
</body>

</html>
