<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather Pro</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        .glass {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body id="appBg"
    class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-900 to-black text-white transition-all duration-500">

    <div class="w-full max-w-sm p-4">

        <!-- Search -->
        <div class="flex gap-2 mb-4">
            <input id="cityInput" type="text" placeholder="Search city..."
                class="w-full p-3 rounded-xl glass focus:outline-none" />
            <button id="searchBtn" class="px-4 rounded-xl glass hover:bg-white/20">🔍</button>
        </div>

        <!-- Main Card -->
        <div class="glass rounded-3xl p-6 relative overflow-hidden">

            <!-- Loader -->
            <p id="loader" class="text-center hidden mb-2">Loading...</p>

            <!-- City -->
            <h2 id="cityName" class="text-xl opacity-80">City</h2>

            <!-- Big Temp -->
            <div class="flex items-center justify-between mt-2">
                <h1 id="temperature" class="text-7xl font-bold tracking-tight">25°</h1>
                <img id="weatherIcon" class="w-16 h-16" />
            </div>

            <!-- Description -->
            <p id="description" class="opacity-70 capitalize">clear sky</p>

            <!-- Extra Info -->
            <div class="flex justify-between mt-6 text-sm opacity-80">
                <div>
                    <p>Humidity</p>
                    <p id="humidity" class="font-semibold">--%</p>
                </div>
                <div>
                    <p>Wind</p>
                    <p id="wind" class="font-semibold">-- km/h</p>
                </div>
            </div>

            <!-- Hourly Strip (UI only) -->
            <div class="mt-6 flex gap-3 overflow-x-auto pb-2">
                <div class="min-w-15 glass p-2 rounded-xl text-center">12:00<br>☀️<br>30°</div>
                <div class="min-w-15 glass p-2 rounded-xl text-center">13:00<br>🌤<br>29°</div>
                <div class="min-w-15 glass p-2 rounded-xl text-center">14:00<br>☁️<br>26°</div>
                <div class="min-w-15 glass p-2 rounded-xl text-center">15:00<br>🌥<br>24°</div>
            </div>

        </div>

        <!-- Location Button -->
        <button id="locationBtn" class="w-full mt-4 py-2 glass rounded-xl hover:bg-white/20">
            Use My Location 📍
        </button>

    </div>

    <script src="app.js"></script>
</body>

</html>
